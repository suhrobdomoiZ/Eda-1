syntax = "proto3";

package common;

option go_package = "github.com/suhrobdomoiZ/Eda-1/pkg/api/common";

// Статусы заказа
enum OrderStatus {
  ORDER_STATUS_CREATED = 0;                 // Создан
  ORDER_STATUS_COOKING = 1;                 // Готовится
  ORDER_STATUS_READY = 2;                   // Готов
  ORDER_STATUS_DELIVERING = 3;              // В процессе доставки
  ORDER_STATUS_DELIVERED = 4;               // Отдан заказчику
  ORDER_STATUS_CANCELED = 5;                // Отменен
}

// Позиция в заказе
message OrderItem {                         //OrderedProduct в бд
  string product_id = 1;                    // id товара
  string name = 2;                          // Название
  int32 quantity = 3;                       // Количество
  int64 price = 4;                          // Цена
}

// Модель заказа
message Order {
  string id = 1;                            // id заказа
  string restaurant_id = 2;                 // id ресторана
  string courier_id = 3;                    // id курьера
  string client_id = 4;                     // id заказчика
  string address = 5;                       // Адрес доставки
  repeated OrderItem items = 6;             // Товары в заказе
  int64 total_price = 7;                    // Общая стоимость
  OrderStatus status = 8;                   // Статус заказа
}

// Адрес доставки (пока оставил на будущее)
message DeliveryAddress {
  string street = 1;
  string building = 2;
  string apartment = 3;
  string entrance = 4;
  string floor = 5;
  string comment = 6;
}


enum UserRole {
  USER_ROLE_CUSTOMER    = 0;
  USER_ROLE_RESTAURANT  = 1;
  USER_ROLE_COURIER     = 2;
  USER_ROLE_ADMIN       = 3;
}


// Базовый профиль - для любого пользователя
message UserProfile {
  string id         = 1;   // UUID
  string username   = 2;
  UserRole role     = 3;
}

// Расширенный профиль ресторана
message RestaurantProfile {
  string id          = 1;
  string name        = 2;
  string description = 3;
  string address     = 4;
  string phone       = 5;
  double rating      = 6;   // средний рейтинг 
  bool   is_open     = 7;
}

// Расширенный профиль курьера
message CourierProfile {
  string id        = 1;
  string name      = 2;
  string phone     = 3;
  bool   is_active = 4;   // доступен для заказов
  double rating    = 5;   // средний рейтинг 
  int64  earnings  = 6;   // общий заработок
}