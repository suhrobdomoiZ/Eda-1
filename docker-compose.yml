services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api_gateway
    networks:
      - backend

  api_gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    env_file: .env
    depends_on:
      database:
        condition: service_healthy
    networks:
      - backend

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    env_file: .env
    depends_on:
      database:
        condition: service_healthy
    networks:
      - backend

  courier:
    build:
      context: .
      dockerfile: services/courier/Dockerfile
    env_file: .env
    depends_on:
      database:
        condition: service_healthy
    networks:
      - backend

  customer:
    build:
      context: .
      dockerfile: services/customer/Dockerfile
    env_file: .env
    depends_on:
      database:
        condition: service_healthy
    networks:
      - backend

  restaurant:
    build:
      context: .
      dockerfile: services/restaurant/Dockerfile
    env_file: .env
    depends_on:
      database:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  pgdata:
  redisdata:

