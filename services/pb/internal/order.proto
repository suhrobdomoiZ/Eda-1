syntax = "proto3";

package internal.orders;

option go_package = "pkg/api/internal/orders";

// Внутренний сервис заказов
service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (UpdateOrderStatusResponse);
}

// Общее

enum OrderStatus {
  ORDER_STATUS_CREATED = 0;                 // Создан
  ORDER_STATUS_COOKING = 1;                 // Готовится
  ORDER_STATUS_READY = 2;                   // Готов
  ORDER_STATUS_DELIVERING = 3;              // В процессе доставки
  ORDER_STATUS_DELIVERED = 4;               // Отдан заказчику
  ORDER_STATUS_CANCELED = 5;                // Отменен
}

message DeliveryAddress {
  string street = 1;                        // Улица
  string building = 2;                      // Дом
  string apartment = 3;                     // Квартира
  string entrance = 4;                      // Подъезд
  string floor = 5;                         // Этаж
  string comment = 6;                       // Комментарий курьеру
}

message OrderItem {
  string product_id = 1;                    // id товара
  string name = 2;                          // Название
  int32 quantity = 3;                       // Количество
  int64 price = 4;                          // Цена
}

// Внутренняя модель заказа
message Order {
  string id = 1;                            // id заказа
  string restaurant_id = 2;                 // id ресторана
  string courier_id = 3;                    // id курьера
  string client_id = 4;                     // id заказчика
  DeliveryAddress address = 5;              // Адрес доставки
  repeated OrderItem items = 6;             // Товары в заказе
  int64 total_price = 7;                    // Общая стоимость
  OrderStatus status = 8;                   // Статус заказа
}

// Создание заказа

message CreateOrderItem {
  string product_id = 1;
  int32 quantity = 2;
}

message CreateOrderRequest {
  string user_id = 1;
  string restaurant_id = 2;
  repeated CreateOrderItem items = 3;
  DeliveryAddress address = 4;
}

message CreateOrderResponse {
  string order_id = 1;
  OrderStatus status = 2;
}

// Получение информации о заказе

message GetOrderRequest {
  string order_id = 1;
}

message GetOrderResponse {
  Order order = 1;
}

// Отмена заказа

message CancelOrderRequest {
  string order_id = 1;
  string cancelled_by = 2;
}

message CancelOrderResponse {
  bool success = 1;
  int64 refund_amount = 2;
}

// Получение информации обо всех заказах

message ListOrdersRequest {
  string user_id = 1;                       // Фильтр по пользователю
  string restaurant_id = 2;                 // Фильтр по ресторану
  string courier_id = 3;                    // Фильтр по курьеру
  OrderStatus status = 4;                   // Фильтр по статусу
  int32 limit = 5;                          // Количество в одном запросе
  int32 offset = 6;                         // Сдвиг от начала
}

message ListOrdersResponse {
  repeated Order orders = 1;
  int32 total = 2;
}

// Изменение статуса заказа

message UpdateOrderStatusRequest {
  string order_id = 1;                      // id заказа
  OrderStatus status = 2;                   // Статус
  string courier_id = 3;                    // Если назначается курьер
  string updated_by = 4;                    // Кто обновил
}

message UpdateOrderStatusResponse {
  bool success = 1;
}
